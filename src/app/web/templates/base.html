<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ request.app.title }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1020;
        --surface: #171d34;
        --surface-border: rgba(255, 255, 255, 0.08);
        --accent: #8257e6;
        --text: #eef2ff;
        --muted: #aeb7d6;
        --danger: #ff8686;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1b2240 0%, var(--bg) 55%);
        color: var(--text);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.08;
      }

      h2 {
        margin-bottom: 0.75rem;
        font-size: 1.25rem;
      }

      .eyebrow {
        margin: 0 0 0.5rem;
        color: #9b78ef;
        font-size: 0.92rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input {
        font: inherit;
      }

      .page-shell {
        width: min(90vw, 72rem);
        margin: 0 auto;
        padding: 2rem 0 2.5rem;
      }

      .page-stack {
        display: grid;
        gap: 1rem;
      }

      .surface {
        padding: 0.25rem 0;
        border: 0;
        background: transparent;
      }

      .section-copy {
        max-width: 56rem;
        line-height: 1.6;
      }

      .muted {
        color: var(--muted);
      }

      .error-text {
        color: var(--danger);
      }

      .form-stack {
        display: grid;
        gap: 0.85rem;
      }

      .top-gap {
        margin-top: 1rem;
      }

      .button-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .text-input {
        width: 100%;
        padding: 0.95rem 1rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
      }

      .text-input:focus {
        outline: 2px solid rgba(130, 87, 230, 0.55);
        border-color: transparent;
      }

      .setting-input-shell {
        position: relative;
        display: block;
      }

      .setting-input-hint {
        position: absolute;
        top: 50%;
        right: 1rem;
        max-width: calc(100% - 2rem);
        transform: translateY(-50%);
        color: rgba(238, 242, 255, 0);
        font-size: 0.78rem;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 140ms ease;
      }

      .setting-input-shell:hover .setting-input-hint,
      .setting-input-shell:focus-within .setting-input-hint {
        color: rgba(174, 183, 214, 0.85);
      }

      .primary-button,
      .secondary-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: 160ms ease;
      }

      .primary-button {
        background: var(--accent);
        color: white;
      }

      .secondary-button {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.06);
      }

      .primary-button:hover,
      .secondary-button:hover {
        transform: translateY(-1px);
      }

      .section-divider {
        width: min(100%, 72rem);
        height: 1px;
        margin: 0.25rem auto;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      }
    </style>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
