<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ request.app.title }}</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }

      .card {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: #1f2937;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      .stack > * + * {
        margin-top: 0.75rem;
      }

      h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 0.5rem;
        padding: 0.8rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #374151;
        font: inherit;
      }

      input {
        background: #111827;
        color: inherit;
      }

      button {
        margin-top: 1rem;
        background: #2563eb;
        color: inherit;
        cursor: pointer;
      }

      .error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
